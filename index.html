<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proofism • Intelligence System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #030303;
            --text-color: #ffffff;
            --accent-green: #00ff41;
            --border-color: #2a2a2a;
            --polished-gradient: linear-gradient(135deg, #181818 0%, #111 50%, #181818 100%);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 550px; padding: 20px; text-align: center; }

        /* --- HEADER --- */
        header h1 { font-size: 3.5rem; font-weight: 300; margin: 0; letter-spacing: -2px; }
        .sub-title { font-size: 0.7rem; letter-spacing: 4px; color: #555; text-transform: uppercase; margin-bottom: 40px; }

        /* --- CARDS --- */
        .option-card {
            background: var(--polished-gradient);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: white;
        }
        .option-card:hover { border-color: #555; transform: translateY(-2px); }
        .option-card.sebbi { border-color: #444; background: rgba(255,255,255,0.02); margin-top: 30px; }

        /* --- TEST INTERFACE --- */
        #loader-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; font-family: monospace; }
        .matrix-text { color: var(--accent-green); font-size: 0.8rem; text-align: left; width: 80%; line-height: 1.5; }

        #test-area { display: none; }
        .btn-ans { 
            background: rgba(255,255,255,0.03); border: 1px solid #333; color: white; 
            padding: 15px; width: 100%; margin: 8px 0; border-radius: 10px; cursor: pointer; text-align: left;
        }
        .btn-ans:hover { background: white; color: black; }

        textarea {
            width: 100%; background: #111; border: 1px solid #333; color: white;
            padding: 15px; border-radius: 10px; font-family: inherit; margin-bottom: 15px; resize: none;
        }

        /* --- PROCESSING --- */
        #processing-screen { display: none; }
        .gear { font-size: 3rem; color: #555; animation: spin 2s linear infinite; margin-bottom: 20px; }
        #timer { font-family: monospace; font-size: 1.5rem; color: var(--accent-green); }

        /* --- RESULTS --- */
        #result-screen { display: none; }
        .percent { font-size: 5rem; font-weight: bold; margin: 20px 0; color: var(--accent-green); }
        .close-x { display: none; position: fixed; top: 20px; right: 20px; font-size: 2.5rem; cursor: pointer; color: #444; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="container" id="main-menu">
        <header>
            <h1>Proofism</h1>
            <div class="sub-title">autism tests and characteristics</div>
        </header>
        
        <div class="option-card" onclick="startTest(30)">
            <span>30 preguntas</span>
            <i class="fas fa-microchip"></i>
        </div>
        <div class="option-card" onclick="startTest(50)">
            <span>50 preguntas</span>
            <i class="fas fa-brain"></i>
        </div>
        <div class="option-card" onclick="startTest(100)">
            <span>100 preguntas</span>
            <i class="fas fa-database"></i>
        </div>

        <a href="https://colmenares0910-code.github.io/mi-pagina./" class="option-card sebbi">
            <span>sebbi/web</span>
            <i class="fas fa-external-link-alt"></i>
        </a>
    </div>

    <div id="loader-screen">
        <div class="matrix-text" id="matrix-lines"></div>
    </div>

    <div class="container" id="test-area">
        <div id="question-container"></div>
    </div>

    <div class="container" id="processing-screen">
        <i class="fas fa-cog gear"></i>
        <p style="letter-spacing: 2px;">SISTEMA ANALIZANDO RESPUESTAS PROFUNDAS...</p>
        <div id="timer">00:00:00</div>
    </div>

    <div class="container" id="result-screen">
        <div class="percent" id="final-percent">0%</div>
        <p id="final-msg" style="line-height: 1.8; color: #ccc;"></p>
    </div>

    <div class="close-x" id="exit-btn" onclick="location.reload()">×</div>

    <script>
        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;

        function startTest(num) {
            document.getElementById('main-menu').style.display = 'none';
            const loader = document.getElementById('loader-screen');
            loader.style.display = 'flex';
            
            const logs = ["CONNECTING_TO_NEURAL_NETWORK...", "ANALYZING_BEHAVIORAL_PATTERNS...", "BOOTING_EMPATHY_MODULE...", "DATA_ENCRYPTION_ENABLED...", "READY_FOR_SCAN..."];
            let i = 0;
            const interval = setInterval(() => {
                document.getElementById('matrix-lines').innerHTML += `> ${logs[i % logs.length]}<br>`;
                i++;
                if(i > 12) { clearInterval(interval); loader.style.display = 'none'; initTest(num); }
            }, 200);
        }

        function initTest(num) {
            document.getElementById('test-area').style.display = 'block';
            generateDeepQuestions(num);
            showQuestion();
        }

        function generateDeepQuestions(num) {
            currentQuestions = [];
            for(let i=1; i<=num; i++) {
                if(i % 5 === 0) { // Cada 5 preguntas, una es de texto libre
                    currentQuestions.push({
                        type: 'text',
                        text: `Análisis ${i}: Describe detalladamente cómo te sientes cuando un plan cambia de imprevisto.`
                    });
                } else {
                    currentQuestions.push({
                        type: 'choice',
                        text: `Pregunta Profunda ${i}: ¿Cómo describirías tu enfoque hacia los detalles técnicos o patrones complejos?`,
                        options: ["Enfoque absoluto y obsesivo", "Interés moderado", "Dificultad para concentrarme", "Lo percibo de forma intuitiva"]
                    });
                }
            }
        }

        function showQuestion() {
            const container = document.getElementById('question-container');
            const q = currentQuestions[currentIndex];
            let html = `<p style="color: #444; font-size: 0.7rem; margin-bottom: 20px;">SYSTEM_SCAN: ${currentIndex + 1} / ${currentQuestions.length}</p>
                        <h2 style="font-weight: 300; margin-bottom: 30px;">${q.text}</h2>`;

            if(q.type === 'choice') {
                q.options.forEach((opt, idx) => {
                    html += `<button class="btn-ans" onclick="handleAns(${idx > 0 ? 1 : 2})">${opt}</button>`;
                });
            } else {
                html += `<textarea id="text-ans" rows="4" placeholder="Escribe tu respuesta aquí..."></textarea>
                         <button class="btn-ans" style="text-align:center; background: var(--accent-green); color: black;" onclick="handleAns(2)">ENVIAR ANÁLISIS</button>`;
            }
            container.innerHTML = html;
        }

        function handleAns(pts) {
            score += pts;
            currentIndex++;
            if(currentIndex < currentQuestions.length) showQuestion();
            else finishTest();
        }

        function finishTest() {
            document.getElementById('test-area').style.display = 'none';
            document.getElementById('processing-screen').style.display = 'block';
            let seconds = 0;
            const timerInt = setInterval(() => {
                seconds += 0.01;
                document.getElementById('timer').innerText = seconds.toFixed(2).replace('.', ':');
            }, 10);

            setTimeout(() => {
                clearInterval(timerInt);
                showFinalResult();
            }, Math.random() * 5000 + 7000); // Piensa entre 7 y 12 segundos
        }

        function showFinalResult() {
            document.getElementById('processing-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            const p = Math.min(Math.round((score / (currentQuestions.length * 1.5)) * 100), 100);
            document.getElementById('final-percent').innerText = p + "%";
            document.getElementById('final-msg').innerText = "El sistema ha detectado una configuración neuronal única. Tu manera de procesar el mundo es profunda y llena de matices. Recuerda que ser diferente es lo que permite al mundo avanzar hacia nuevas perspectivas.";
            
            setTimeout(() => { document.getElementById('exit-btn').style.display = 'block'; }, 10000);
        }
    </script>
</body>
</html>
