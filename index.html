<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proofism • Test de Orientación</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --accent: #0f3460;
            --text: #e94560; /* Color vibrante para el test */
            --white: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .test-container {
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 500px;
            width: 90%;
            text-align: center;
            border: 1px solid var(--accent);
        }

        h1 { color: var(--text); margin-bottom: 30px; }

        .question {
            display: none; /* Se muestran de una en una */
            animation: fadeIn 0.5s ease;
        }

        .question.active { display: block; }

        .options button {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        .options button:hover { background: var(--text); transform: scale(1.02); }

        #result { display: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="test-container" id="quiz">
        <h1>Proofism Test</h1>
        
        <!-- Pregunta 1 -->
        <div class="question active" id="q1">
            <p>1. ¿Prefieres realizar actividades solo antes que con otras personas?</p>
            <div class="options">
                <button onclick="nextQuestion(1, 1)">Sí, a menudo</button>
                <button onclick="nextQuestion(1, 0)">No realmente</button>
            </div>
        </div>

        <!-- Pregunta 2 -->
        <div class="question" id="q2">
            <p>2. ¿Te resulta difícil entender las bromas o el sarcasmo?</p>
            <div class="options">
                <button onclick="nextQuestion(2, 1)">Me pasa seguido</button>
                <button onclick="nextQuestion(2, 0)">Lo entiendo bien</button>
            </div>
        </div>

        <!-- Pregunta 3 -->
        <div class="question" id="q3">
            <p>3. ¿Notas sonidos o texturas que otros parecen ignorar?</p>
            <div class="options">
                <button onclick="nextQuestion(3, 1)">Sí, soy muy sensible a eso</button>
                <button onclick="nextQuestion(3, 0)">No, me da igual</button>
            </div>
        </div>

        <!-- Resultado Final -->
        <div id="result">
            <h2>Resultado</h2>
            <p id="score-text"></p>
            <p style="font-size: 0.8rem; color: #888;">*Este es un test de prueba. Siempre consulta con un profesional.</p>
            <button onclick="location.reload()" style="background: var(--text); border: none; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px;">Reiniciar</button>
        </div>
    </div>

    <script>
        let score = 0;
        let totalQuestions = 3;

        function nextQuestion(current, points) {
            score += points;
            document.getElementById('q' + current).classList.remove('active');
            
            if (current < totalQuestions) {
                document.getElementById('q' + (current + 1)).classList.add('active');
            } else {
                showResult();
            }
        }

        function showResult() {
            document.querySelector('h1').style.display = 'none';
            document.getElementById('result').style.display = 'block';
            let text = "";
            if (score >= 2) {
                text = "Muestras varios rasgos comunes en el espectro. Sería interesante investigar más sobre neurodiversidad.";
            } else {
                text = "No muestras rasgos predominantes en este test rápido.";
            }
            document.getElementById('score-text').innerText = text;
        }
    </script>
</body>
</html>
