<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proofism • System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #030303;
            --text-color: #ffffff;
            --accent-green: #00ff41;
            --border-color: #2a2a2a;
            --polished-gradient: linear-gradient(135deg, #181818 0%, #111 50%, #181818 100%);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container { width: 100%; max-width: 500px; padding: 20px; text-align: center; }

        /* --- INICIO ESTILO SEBBI/WEB --- */
        header h1 { font-size: 3.5rem; font-weight: 300; margin: 0; letter-spacing: -2px; }
        .sub-title { font-size: 0.7rem; letter-spacing: 4px; color: #555; text-transform: uppercase; margin-bottom: 40px; }

        .option-card {
            background: var(--polished-gradient);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .option-card:hover { border-color: #555; transform: translateY(-2px); }
        .option-card span { font-size: 1rem; font-weight: 400; }
        .option-card i { color: #444; }

        /* --- PANTALLA DE CARGA (CÓDIGO VERDE) --- */
        #loader-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 9999; flex-direction: column;
            justify-content: center; align-items: center; font-family: monospace;
        }
        .matrix-text { color: var(--accent-green); font-size: 0.8rem; text-align: left; width: 80%; max-height: 300px; overflow: hidden; line-height: 1.5; }

        /* --- TEST INTERFACE --- */
        #test-area { display: none; }
        .question-box { margin-bottom: 30px; animation: fadeInUp 0.5s ease; }
        .btn-ans { 
            background: none; border: 1px solid #333; color: white; 
            padding: 15px; width: 100%; margin: 10px 0; border-radius: 8px; cursor: pointer;
        }
        .btn-ans:hover { background: white; color: black; }

        /* --- PROCESAMIENTO FINAL --- */
        #processing-screen {
            display: none; text-align: center;
        }
        .gear { font-size: 3rem; color: #555; animation: spin 2s linear infinite; margin-bottom: 20px; }
        #timer { font-family: monospace; font-size: 1.5rem; color: var(--accent-green); }

        /* --- RESULTADOS --- */
        #result-screen { display: none; }
        .percent { font-size: 4rem; font-weight: bold; margin: 20px 0; }
        .msg { color: #aaa; font-style: italic; line-height: 1.6; }
        .close-x { 
            display: none; position: fixed; top: 20px; right: 20px; 
            font-size: 2rem; cursor: pointer; color: #444; 
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- PANTALLA INICIAL -->
    <div class="container" id="main-menu">
        <header>
            <h1>Proofism</h1>
            <div class="sub-title">autism tests and characteristics</div>
        </header>
        
        <div class="option-card" onclick="startTest(30)">
            <span>Prueba Estándar (30 preguntas)</span>
            <i class="fas fa-microchip"></i>
        </div>
        <div class="option-card" onclick="startTest(50)">
            <span>Análisis Profundo (50 preguntas)</span>
            <i class="fas fa-brain"></i>
        </div>
        <div class="option-card" onclick="startTest(100)">
            <span>Escaneo Completo (100 preguntas)</span>
            <i class="fas fa-database"></i>
        </div>
    </div>

    <!-- PANTALLA DE CARGA MATRIX -->
    <div id="loader-screen">
        <div class="matrix-text" id="matrix-lines"></div>
    </div>

    <!-- AREA DE PREGUNTAS -->
    <div class="container" id="test-area">
        <div id="question-container"></div>
    </div>

    <!-- PANTALLA DE PENSANDO -->
    <div class="container" id="processing-screen">
        <i class="fas fa-cog gear"></i>
        <p>SISTEMA ANALIZANDO PATRONES...</p>
        <div id="timer">00:00:00</div>
    </div>

    <!-- RESULTADO FINAL -->
    <div class="container" id="result-screen">
        <div class="sub-title">RESULTADO DEL ANÁLISIS</div>
        <div class="percent" id="final-percent">0%</div>
        <p class="msg" id="final-msg"></p>
    </div>

    <div class="close-x" id="exit-btn" onclick="location.reload()">×</div>

    <script>
        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;

        function startTest(num) {
            document.getElementById('main-menu').style.display = 'none';
            const loader = document.getElementById('loader-screen');
            loader.style.display = 'flex';

            // Simulación de carga de códigos
            const lines = ["INITIALIZING...", "LOADING_CORE_ALGORITHMS...", "FETCHING_DATA_SENSORS...", "DECRYPTING_NEURAL_MAPS...", "OPTIMIZING_INTERFACES...", "SYSTEM_READY_"];
            let i = 0;
            const interval = setInterval(() => {
                document.getElementById('matrix-lines').innerHTML += `> ${lines[i % lines.length]}<br>`;
                i++;
                if(i > 15) {
                    clearInterval(interval);
                    loader.style.display = 'none';
                    initTest(num);
                }
            }, 150);
        }

        function initTest(num) {
            document.getElementById('test-area').style.display = 'block';
            currentIndex = 0;
            score = 0;
            generateQuestions(num);
            showQuestion();
        }

        function generateQuestions(num) {
            currentQuestions = [];
            for(let i=1; i<=num; i++) {
                currentQuestions.push({
                    text: `Pregunta de profundidad nivel ${i}: ¿Cómo procesas el entorno en situaciones de alta carga sensorial?`,
                    ans: ["Alta sensibilidad", "Procesamiento neutro"]
                });
            }
        }

        function showQuestion() {
            const container = document.getElementById('question-container');
            const q = currentQuestions[currentIndex];
            container.innerHTML = `
                <div class="question-box">
                    <p style="color: #555; font-size: 0.8rem;">ANÁLISIS ${currentIndex + 1} / ${currentQuestions.length}</p>
                    <h2 style="font-weight: 300;">${q.text}</h2>
                    <button class="btn-ans" onclick="handleAns(1)">${q.ans[0]}</button>
                    <button class="btn-ans" onclick="handleAns(0)">${q.ans[1]}</button>
                </div>
            `;
        }

        function handleAns(pts) {
            score += pts;
            currentIndex++;
            if(currentIndex < currentQuestions.length) {
                showQuestion();
            } else {
                finishTest();
            }
        }

        function finishTest() {
            document.getElementById('test-area').style.display = 'none';
            document.getElementById('processing-screen').style.display = 'block';
            
            let seconds = 0;
            const timerElement = document.getElementById('timer');
            
            // El sistema "piensa" un tiempo aleatorio entre 5 y 10 segundos
            const thinkingTime = Math.floor(Math.random() * 5000) + 5000;

            const timerInt = setInterval(() => {
                seconds += 0.01;
                timerElement.innerText = seconds.toFixed(2).replace('.', ':');
            }, 10);

            setTimeout(() => {
                clearInterval(timerInt);
                showFinalResult();
            }, thinkingTime);
        }

        function showFinalResult() {
            document.getElementById('processing-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            const p = Math.round((score / currentQuestions.length) * 100);
            document.getElementById('final-percent').innerText = p + "%";
            
            const msg = p > 50 ? 
                "Tu configuración neuronal muestra una alta afinidad con el espectro. Eres una persona con una percepción única y valiosa del mundo. La neurodiversidad es tu superpoder." : 
                "Presentas rasgos equilibrados. Tu forma de ver el mundo aporta claridad y una perspectiva necesaria. Nunca dejes de explorar tu potencial único.";
            
            document.getElementById('final-msg').innerText = msg;

            setTimeout(() => {
                document.getElementById('exit-btn').style.display = 'block';
            }, 10000);
        }
    </script>
</body>
</html>
